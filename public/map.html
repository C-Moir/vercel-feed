<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deploy-feed — live map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }

  #top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }
  #top-bar a {
    color: #6c63ff; text-decoration: none; font-size: 12px;
    pointer-events: all;
  }
  #top-bar a:hover { text-decoration: underline; }
  #title { font-size: 14px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
  #reset-countdown { font-size: 11px; color: #444; }

  #stats-hud {
    position: absolute; bottom: 24px; left: 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-line { font-size: 12px; color: #555; }
  .stat-line span { color: #6c63ff; }

  #legend {
    position: absolute; bottom: 24px; right: 20px;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #555; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  #detail-panel {
    position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
    width: 260px; background: rgba(10,10,20,0.92); border: 1px solid #222;
    border-radius: 10px; padding: 16px; pointer-events: all;
    display: none; backdrop-filter: blur(8px);
  }
  #detail-panel.visible { display: block; }
  #detail-close {
    position: absolute; top: 10px; right: 12px; cursor: pointer;
    color: #555; font-size: 16px; line-height: 1; pointer-events: all;
  }
  #detail-close:hover { color: #ccc; }

  /* Platform info panel — left side, mirrors detail panel on right */
  #platform-modal {
    position: absolute; top: 50%; left: 20px; transform: translateY(-50%);
    width: 300px; max-height: 72vh; background: rgba(8,8,20,0.96);
    border: 1px solid #2a2a4e; border-radius: 12px; padding: 20px;
    pointer-events: all; display: none; backdrop-filter: blur(12px);
    overflow: hidden; flex-direction: column; gap: 12px;
  }
  #platform-modal.visible { display: flex; }
  #platform-modal-close {
    position: absolute; top: 12px; right: 14px; cursor: pointer;
    color: #555; font-size: 18px; pointer-events: all;
  }
  #platform-modal-close:hover { color: #ccc; }
  #platform-modal-name {
    font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  }
  #platform-modal-stats { font-size: 12px; color: #555; display: flex; gap: 16px; }
  #platform-modal-stats span { color: #6c63ff; font-weight: 600; }
  #platform-modal-list {
    overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
    max-height: 50vh; padding-right: 4px;
  }
  #platform-modal-list::-webkit-scrollbar { width: 4px; }
  #platform-modal-list::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 2px; }
  .modal-entry {
    background: #111120; border: 1px solid #1e1e30; border-radius: 6px;
    padding: 8px 10px; cursor: pointer;
  }
  .modal-entry:hover { border-color: #6c63ff; }
  .modal-entry-host { font-size: 11px; color: #8888cc; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-entry-title { font-size: 10px; color: #444; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-entry-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .modal-badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
  .mb-clean      { background:#002200; color:#4caf50; }
  .mb-suspicious { background:#2a1a00; color:#ff8c00; }
  .mb-flagged    { background:#2a0000; color:#ff4444; }
  .mb-scanning   { background:#111; color:#555; }
  .mb-404        { background:#111; color:#333; }
  #detail-screenshot {
    width: 100%; height: 130px; object-fit: cover; border-radius: 6px;
    background: #111; display: block; margin-bottom: 12px;
  }
  #detail-title { font-size: 13px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; word-break: break-word; }
  #detail-host  { font-size: 10px; color: #555; font-family: monospace; margin-bottom: 10px; word-break: break-all; }
  .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .detail-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid #333;
  }
  .db-clean      { background:#002200; color:#4caf50; border-color:#004400; }
  .db-suspicious { background:#2a1a00; color:#ff8c00; border-color:#4a2a00; }
  .db-flagged    { background:#2a0000; color:#ff4444; border-color:#4a0000; }
  .db-scanning   { background:#111; color:#555; }
  .db-platform   { background:#1a1a2e; color:#6c63ff; border-color:#2a2a4e; }
  .db-framework  { background:#1a1a2e; color:#6c63ff; border-color:#2a2a4e; }
  .detail-actions { display: flex; flex-direction: column; gap: 6px; }
  .detail-btn {
    display: block; text-align: center; padding: 6px 12px; border-radius: 8px;
    font-size: 11px; text-decoration: none; border: 1px solid #333;
    color: #888; background: #1a1a2e; pointer-events: all;
  }
  .detail-btn:hover { border-color: #6c63ff; color: #6c63ff; }
  .detail-btn.primary { background: #1a1a3e; border-color: #6c63ff; color: #6c63ff; }
  .detail-btn.danger  { background: #1a0000; border-color: #4a0000; color: #ff4444; }

  #tooltip {
    position: absolute; background: rgba(0,0,0,0.85); border: 1px solid #222;
    border-radius: 6px; padding: 6px 10px; font-size: 11px; color: #aaa;
    pointer-events: none; display: none; max-width: 220px; word-break: break-word;
  }

  /* CSS2D platform labels */
  .platform-label {
    color: #ccd; font-size: 12px; letter-spacing: 2px; font-weight: 600;
    text-transform: uppercase; white-space: nowrap;
    text-shadow: 0 0 12px rgba(100,100,255,0.8), 0 0 4px rgba(0,0,0,1);
    pointer-events: none; user-select: none;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="top-bar">
    <a href="/">← Live feed</a>
    <span id="title">deploy map</span>
    <span id="reset-countdown"></span>
  </div>

  <div id="stats-hud">
    <div class="stat-line">Seen today: <span id="s-total">0</span></div>
    <div class="stat-line">Flagged: <span id="s-flagged">0</span></div>
    <div class="stat-line">Platforms: <span id="s-platforms">12</span></div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff3333"></div>Flagged</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff8c00"></div>Suspicious</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2d8a2d"></div>Clean</div>
    <div class="legend-item"><div class="legend-dot" style="background:#336699"></div>Scanning</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e1e2e"></div>Pending / 404</div>
  </div>

  <div id="detail-panel">
    <span id="detail-close">✕</span>
    <img id="detail-screenshot" src="" alt="">
    <div id="detail-title"></div>
    <div id="detail-host"></div>
    <div class="detail-badges" id="detail-badges"></div>
    <div class="detail-actions" id="detail-actions"></div>
  </div>

  <div id="tooltip"></div>

  <div id="platform-modal">
    <span id="platform-modal-close">✕</span>
    <div id="platform-modal-name"></div>
    <div id="platform-modal-stats">
      <div>Deployments: <span id="pm-count">0</span></div>
      <div>Flagged: <span id="pm-flagged">0</span></div>
    </div>
    <div id="platform-modal-list"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ─── Constants ───────────────────────────────────────────────────────────────

// orbitR  = how far nodes orbit from planet centre (ring radius)
// tilt    = ring inclination in radians (0 = flat horizontal, Math.PI/2 = vertical)
// planetR = visual size of the planet sphere
// sceneR  = distance from scene origin
const PLATFORMS = [
  { name: 'CF Pages', color: 0xf6821f, orbitR: 10, tilt: 0.55, planetR: 3.2, sceneR: 50 },
  { name: 'Workers',  color: 0xffb347, orbitR:  9, tilt: 1.70, planetR: 2.8, sceneR: 56 },
  { name: 'GitHub',   color: 0x9b59b6, orbitR:  9, tilt: 0.85, planetR: 2.6, sceneR: 62 },
  { name: 'Render',   color: 0x46e3b7, orbitR:  7, tilt: 0.40, planetR: 2.0, sceneR: 67 },
  { name: 'Railway',  color: 0xa855f7, orbitR:  6, tilt: 1.55, planetR: 1.8, sceneR: 71 },
  { name: 'Fly.io',   color: 0x7b2bf9, orbitR:  6, tilt: 0.70, planetR: 1.7, sceneR: 74 },
  { name: 'Replit',   color: 0xf26207, orbitR:  5, tilt: 1.10, planetR: 1.6, sceneR: 77 },
  { name: 'Deno',     color: 0x70ffaf, orbitR:  5, tilt: 1.20, planetR: 1.4, sceneR: 80 },
];

const STATUS_COLOR = {
  pending:    0x3344aa,
  scanning:   0x44aaff,
  clean:      0x44ff88,
  suspicious: 0xffaa00,
  flagged:    0xff3333,
  '404':      0x333355,
};
const STATUS_EMISSIVE = {
  pending:    0x111144,
  scanning:   0x1155aa,
  clean:      0x115533,
  suspicious: 0x885500,
  flagged:    0xaa1111,
  '404':      0x111122,
};
const STATUS_SIZE = {
  pending:    0.22,
  scanning:   0.28,
  clean:      0.30,
  suspicious: 0.42,
  flagged:    0.58,
  '404':      0.15,
};

// Per-platform ring normal axes (computed from tilt) used for orbital animation
const platformRingAxes = new Map();

// Flagged-rate alerts per platform — updated from SSE stats events
const planetAlerts = new Map(); // platformName → flaggedPct (0-100)

// ─── Scene setup ─────────────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05050f);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'fixed';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05050f, 0.002);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 40, 120);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 10;
controls.maxDistance = 280;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// Lighting
scene.add(new THREE.AmbientLight(0x334466, 4));
const dirLight = new THREE.DirectionalLight(0xaabbff, 1.2);
dirLight.position.set(1, 2, 1);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x6644ff, 0.6);
dirLight2.position.set(-1, -1, -2);
scene.add(dirLight2);

// Starfield background
const starGeom = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 600;
starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x8899cc, size: 0.4, sizeAttenuation: true });
scene.add(new THREE.Points(starGeom, starMat));

// ─── Platform clusters ────────────────────────────────────────────────────────

const clusterPositions = new Map();
const clusterLights = [];
const planetMeshes = new Map(); // platformName → mesh (for click detection)

PLATFORMS.forEach((p, i) => {
  // Spread planets in 3D — not just a flat ring
  const angle = (i / PLATFORMS.length) * Math.PI * 2 + i * 0.4;
  const elevAngle = (i % 3 - 1) * 0.45; // cycle through -0.45, 0, +0.45 elevation
  const x = Math.cos(angle) * p.sceneR * Math.cos(elevAngle);
  const z = Math.sin(angle) * p.sceneR * Math.cos(elevAngle);
  const y = Math.sin(elevAngle) * p.sceneR * 0.5;
  const pos = new THREE.Vector3(x, y, z);
  clusterPositions.set(p.name, pos);

  // Ring normal axis — tilt gives each planet a unique ring orientation
  const axis = new THREE.Vector3(Math.sin(p.tilt), Math.cos(p.tilt), 0).normalize();
  platformRingAxes.set(p.name, axis);

  // Planet sphere
  const planetGeom = new THREE.SphereGeometry(p.planetR, 32, 24);
  const planetMat = new THREE.MeshStandardMaterial({
    color: p.color,
    emissive: p.color,
    emissiveIntensity: 0.15,
    roughness: 0.6,
    metalness: 0.3,
  });
  const planet = new THREE.Mesh(planetGeom, planetMat);
  planet.position.copy(pos);
  planet.userData.platformName = p.name;
  scene.add(planet);
  planetMeshes.set(p.name, planet);

  // Saturn-style ring disc around the planet
  const ringInner = p.planetR * 1.4;
  const ringOuter = p.orbitR * 1.1;
  const ringGeom = new THREE.RingGeometry(ringInner, ringOuter, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: p.color, side: THREE.DoubleSide, transparent: true, opacity: 0.12,
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.position.copy(pos);
  ring.lookAt(pos.clone().add(axis));
  scene.add(ring);

  // Point light
  const light = new THREE.PointLight(p.color, 3.0, 60);
  light.position.copy(pos);
  scene.add(light);
  clusterLights.push(light);

  // Label above planet
  const div = document.createElement('div');
  div.className = 'platform-label';
  div.textContent = p.name;
  const label = new CSS2DObject(div);
  label.position.copy(pos);
  label.position.y += p.planetR + 2.5;
  scene.add(label);
});

// ─── Shared geometries & materials ───────────────────────────────────────────

const GEOMS = {};
Object.entries(STATUS_SIZE).forEach(([status, r]) => {
  GEOMS[status] = new THREE.SphereGeometry(r, 8, 6);
});

function makeMaterial(status) {
  return new THREE.MeshStandardMaterial({
    color: STATUS_COLOR[status],
    emissive: STATUS_EMISSIVE[status],
    emissiveIntensity: status === 'flagged' ? 1.5 : status === 'suspicious' ? 1.0 : 0.8,
    roughness: 0.3,
    metalness: 0.4,
    transparent: true,
    opacity: status === '404' ? 0.4 : 1.0,
  });
}
const MATS = {};
Object.keys(STATUS_COLOR).forEach(s => { MATS[s] = makeMaterial(s); });

// ─── Node management ─────────────────────────────────────────────────────────

const nodeMap = new Map(); // id → { mesh, entry, targetPos, age }
const MAX_NODES_PER_PLATFORM = 40; // cap so no single platform dominates visually

// Place a node in the orbital ring plane around a platform planet
// axis = ring normal (defines the ring's orientation/tilt)
function randomInRing(innerR, outerR, thickness, axis) {
  const theta = Math.random() * Math.PI * 2;
  const r = innerR + Math.random() * (outerR - innerR);
  const h = (Math.random() - 0.5) * thickness;

  // Start in XZ plane, then rotate to align with axis
  const inPlane = new THREE.Vector3(Math.cos(theta) * r, h, Math.sin(theta) * r);
  const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), axis);
  inPlane.applyQuaternion(quat);
  return inPlane;
}

function addOrUpdateNode(entry) {
  const existing = nodeMap.get(entry.id);
  if (existing) {
    // Update material for status change
    existing.mesh.material = MATS[entry.status] || MATS.pending;
    existing.mesh.geometry = GEOMS[entry.status] || GEOMS.pending;
    existing.entry = entry;
    updateStats();
    return;
  }

  const clusterPos = clusterPositions.get(entry.platform) || new THREE.Vector3(0, 0, 0);
  const platformDef = PLATFORMS.find(p => p.name === entry.platform);
  const axis = platformRingAxes.get(entry.platform) || new THREE.Vector3(0, 1, 0);
  const orbitR = platformDef?.orbitR ?? 6;
  const planetR = platformDef?.planetR ?? 2;

  // Enforce per-platform cap — evict oldest node when full
  const platformNodes = [...nodeMap.entries()]
    .filter(([, n]) => n.entry.platform === entry.platform)
    .sort((a, b) => a[1].born - b[1].born);
  if (platformNodes.length >= MAX_NODES_PER_PLATFORM) {
    const [evictId, evictNode] = platformNodes[0];
    scene.remove(evictNode.mesh);
    nodeMap.delete(evictId);
  }

  const targetOffset = randomInRing(planetR * 1.6, orbitR, 0.8, axis);
  const targetPos = clusterPos.clone().add(targetOffset);

  const mesh = new THREE.Mesh(
    GEOMS[entry.status] || GEOMS.pending,
    MATS[entry.status] || MATS.pending
  );

  // Spawn at cluster center, animate outward
  mesh.position.copy(clusterPos);
  mesh.scale.setScalar(0.01);
  scene.add(mesh);

  nodeMap.set(entry.id, { mesh, entry, targetPos, age: 0, born: Date.now() });
  updateStats();
}

// ─── Stats ───────────────────────────────────────────────────────────────────

function updateStats() {
  const total = nodeMap.size;
  const flagged = [...nodeMap.values()].filter(n => n.entry.status === 'flagged').length;
  document.getElementById('s-total').textContent = total.toLocaleString();
  document.getElementById('s-flagged').textContent = flagged.toLocaleString();
}

// ─── 24h reset countdown ─────────────────────────────────────────────────────

const bootTime = Date.now();
const resetAt = bootTime + 24 * 60 * 60 * 1000;

function updateCountdown() {
  const left = Math.max(0, resetAt - Date.now());
  const h = Math.floor(left / 3600000);
  const m = Math.floor((left % 3600000) / 60000);
  const s = Math.floor((left % 60000) / 1000);
  document.getElementById('reset-countdown').textContent =
    `Resets in ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  if (left === 0) resetMap();
}
setInterval(updateCountdown, 1000);
updateCountdown();

function resetMap() {
  // Fade everything out, clear scene nodes, restart SSE
  nodeMap.forEach(({ mesh }) => scene.remove(mesh));
  nodeMap.clear();
  updateStats();
}

// ─── Interaction ─────────────────────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.5;
const mouse = new THREE.Vector2(-9999, -9999);
const tooltip = document.getElementById('tooltip');
const detailPanel = document.getElementById('detail-panel');
let hoveredId = null;
let selectedId = null;

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY + 14) + 'px';
});

// Camera focus animation
let focusTarget = null; // { pos, startPos, startTarget, t }

function focusPlanet(platformName) {
  const pos = clusterPositions.get(platformName);
  if (!pos) return;
  controls.autoRotate = false;
  focusTarget = {
    pos: pos.clone(),
    startCam: camera.position.clone(),
    startTarget: controls.target.clone(),
    t: 0,
  };
  showPlatformModal(platformName);
}

renderer.domElement.addEventListener('click', (e) => {
  // Check planet clicks first
  raycaster.setFromCamera(mouse, camera);
  const planetList = [...planetMeshes.values()];
  const planetHits = raycaster.intersectObjects(planetList);
  if (planetHits.length) {
    const name = planetHits[0].object.userData.platformName;
    focusPlanet(name);
    return;
  }

  // Then check deployment node clicks
  const hit = getHoveredNode();
  if (hit) showDetail(hit.entry);
  else { hideDetail(); hidePlatformModal(); }
});

renderer.domElement.addEventListener('mousedown', () => {
  controls.autoRotate = false;
  focusTarget = null; // user took manual control
});

document.getElementById('detail-close').addEventListener('click', hideDetail);

function getHoveredNode() {
  raycaster.setFromCamera(mouse, camera);
  const meshes = [...nodeMap.values()].map(n => n.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if (!hits.length) return null;
  const hitMesh = hits[0].object;
  return [...nodeMap.values()].find(n => n.mesh === hitMesh) || null;
}

function showDetail(entry) {
  selectedId = entry.id;
  const panel = document.getElementById('detail-panel');

  const img = document.getElementById('detail-screenshot');
  if (entry.screenshot) {
    img.src = entry.screenshot;
    img.style.display = 'block';
  } else if (entry.scan?.urlscanId) {
    img.src = `https://urlscan.io/screenshots/${entry.scan.urlscanId}.png`;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }

  document.getElementById('detail-title').textContent = entry.meta?.title || entry.hostname;
  document.getElementById('detail-host').textContent = entry.hostname;

  const badges = document.getElementById('detail-badges');
  badges.textContent = '';
  function dbadge(text, cls) {
    const b = document.createElement('span');
    b.className = `detail-badge ${cls}`;
    b.textContent = text;
    badges.appendChild(b);
  }
  dbadge(entry.status, `db-${entry.status}`);
  if (entry.platform) dbadge(entry.platform, 'db-platform');
  if (entry.framework) dbadge(entry.framework, 'db-framework');

  const actions = document.getElementById('detail-actions');
  actions.textContent = '';
  function dlink(text, href, cls) {
    const a = document.createElement('a');
    a.className = `detail-btn ${cls || ''}`;
    a.textContent = text;
    a.href = href;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    actions.appendChild(a);
  }

  if (entry.status === 'flagged' || entry.status === 'suspicious') {
    if (entry.scan?.urlscanId)
      dlink('View on URLScan ↗', `https://urlscan.io/result/${entry.scan.urlscanId}/`, 'danger');
  } else {
    dlink('Visit site ↗', entry.url, 'primary');
    if (entry.scan?.urlscanId)
      dlink('URLScan report ↗', `https://urlscan.io/result/${entry.scan.urlscanId}/`);
  }

  panel.classList.add('visible');
}

function hideDetail() {
  selectedId = null;
  document.getElementById('detail-panel').classList.remove('visible');
}

// ─── Platform modal ──────────────────────────────────────────────────────────

const platformModal = document.getElementById('platform-modal');
document.getElementById('platform-modal-close').addEventListener('click', hidePlatformModal);

function showPlatformModal(platformName) {
  const p = PLATFORMS.find(pl => pl.name === platformName);
  const entries = [...nodeMap.values()]
    .filter(n => n.entry.platform === platformName)
    .sort((a, b) => new Date(b.entry.timestamp) - new Date(a.entry.timestamp));

  const flagged = entries.filter(n => n.entry.status === 'flagged').length;

  const nameEl = document.getElementById('platform-modal-name');
  nameEl.textContent = platformName;
  nameEl.style.color = '#' + (p?.color || 0x6c63ff).toString(16).padStart(6, '0');
  document.getElementById('pm-count').textContent = entries.length;
  document.getElementById('pm-flagged').textContent = flagged;

  const list = document.getElementById('platform-modal-list');
  list.textContent = '';

  if (!entries.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:#333;font-size:11px;padding:12px 0;text-align:center';
    empty.textContent = 'No deployments detected yet';
    list.appendChild(empty);
  } else {
    for (const { entry } of entries.slice(0, 50)) {
      const row = document.createElement('div');
      row.className = 'modal-entry';

      const topRow = document.createElement('div');
      topRow.className = 'modal-entry-row';
      const host = document.createElement('div');
      host.className = 'modal-entry-host';
      host.textContent = entry.hostname;
      const badge = document.createElement('span');
      badge.className = `modal-badge mb-${entry.status}`;
      badge.textContent = entry.status;
      topRow.appendChild(host);
      topRow.appendChild(badge);
      row.appendChild(topRow);

      if (entry.meta?.title) {
        const title = document.createElement('div');
        title.className = 'modal-entry-title';
        title.textContent = entry.meta.title;
        row.appendChild(title);
      }

      row.addEventListener('click', () => showDetail(entry));
      list.appendChild(row);
    }
  }

  platformModal.classList.add('visible');
}

function hidePlatformModal() {
  platformModal.classList.remove('visible');
}

// ─── SSE feed ────────────────────────────────────────────────────────────────

function connectSSE() {
  const es = new EventSource('/events');
  es.onmessage = e => {
    try { addOrUpdateNode(JSON.parse(e.data)); } catch (_) {}
  };
  es.addEventListener('stats', e => {
    try {
      const stats = JSON.parse(e.data);
      document.getElementById('s-total').textContent = stats.totalSeen.toLocaleString();
      document.getElementById('s-flagged').textContent = stats.flaggedCount.toLocaleString();
      // Update planet alert levels so the render loop can tint them
      const ps = stats.platformStats || {};
      for (const [name, p] of Object.entries(ps)) {
        planetAlerts.set(name, p.flaggedPct || 0);
      }
    } catch (_) {}
  });
  es.onerror = () => setTimeout(connectSSE, 3000);
}
connectSSE();

// ─── Animation loop ───────────────────────────────────────────────────────────

const clock = new THREE.Clock();
let hoverCheckThrottle = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Animate nodes
  nodeMap.forEach(({ mesh, entry, targetPos, born }) => {
    // Fly into position
    const age = (Date.now() - born) / 1000;
    const lerpSpeed = Math.min(1, age * 2) * 0.08;
    mesh.position.lerp(targetPos, lerpSpeed);

    // Pop in (scale up from 0)
    if (mesh.scale.x < 1) {
      mesh.scale.setScalar(Math.min(1, mesh.scale.x + 0.06));
    }

    // Orbital drift in the ring plane
    const clusterPos = clusterPositions.get(entry.platform) || new THREE.Vector3();
    const ringAxis = platformRingAxes.get(entry.platform) || new THREE.Vector3(0, 1, 0);
    const driftSpeed = 0.015 + (entry.id.charCodeAt(0) % 10) * 0.002;
    const offset = mesh.position.clone().sub(clusterPos);
    offset.applyAxisAngle(ringAxis, driftSpeed * dt);
    mesh.position.copy(clusterPos).add(offset);

    // Pulse flagged nodes
    if (entry.status === 'flagged') {
      const pulse = 1 + Math.sin(t * 4) * 0.25;
      mesh.scale.setScalar(pulse);
      mesh.material.emissiveIntensity = 0.5 + Math.sin(t * 4) * 0.5;
    }

    // Pulse scanning nodes
    if (entry.status === 'scanning') {
      mesh.material.emissiveIntensity = 0.3 + Math.sin(t * 3 + mesh.position.z) * 0.3;
    }
  });

  // Animate cluster lights
  clusterLights.forEach((light, i) => {
    light.intensity = 0.4 + Math.sin(t * 0.5 + i) * 0.2;
  });

  // Tint planets based on per-platform flagged rate
  planetMeshes.forEach((mesh, name) => {
    const pct = planetAlerts.get(name) || 0;
    const platformDef = PLATFORMS.find(pl => pl.name === name);
    if (pct >= 30) {
      // Critical — pulse red
      mesh.material.emissive.setHex(0xcc1111);
      mesh.material.emissiveIntensity = 0.45 + Math.sin(t * 3) * 0.3;
    } else if (pct >= 15) {
      // Elevated — steady amber
      mesh.material.emissive.setHex(0xaa5500);
      mesh.material.emissiveIntensity = 0.3;
    } else if (platformDef) {
      // Normal — restore original colour
      mesh.material.emissive.setHex(platformDef.color);
      mesh.material.emissiveIntensity = 0.15;
    }
  });

  // Hover detection (throttled)
  hoverCheckThrottle += dt;
  if (hoverCheckThrottle > 0.05) {
    hoverCheckThrottle = 0;
    const hit = getHoveredNode();
    const hitId = hit?.entry.id || null;

    if (hitId !== hoveredId) {
      hoveredId = hitId;
      if (hit) {
        tooltip.style.display = 'block';
        tooltip.textContent = hit.entry.hostname;
        renderer.domElement.style.cursor = 'pointer';
      } else {
        tooltip.style.display = 'none';
        renderer.domElement.style.cursor = '';
      }
    }
  }

  // Smooth camera focus animation.
  // controls.update() is skipped during animation — OrbitControls would otherwise
  // recalculate camera position from its internal spherical state every frame,
  // overriding the lerp and preventing any visible movement.
  if (focusTarget) {
    focusTarget.t = Math.min(1, focusTarget.t + dt * 1.5);
    const ease = 1 - Math.pow(1 - focusTarget.t, 3); // cubic ease out

    controls.target.lerpVectors(focusTarget.startTarget, focusTarget.pos, ease);

    // Pull camera to a fixed distance from the planet, preserving approach angle
    const dir = focusTarget.startCam.clone().sub(focusTarget.pos).normalize();
    const destCam = focusTarget.pos.clone().add(dir.multiplyScalar(28));
    camera.position.lerpVectors(focusTarget.startCam, destCam, ease);

    if (focusTarget.t >= 1) {
      focusTarget = null;
      controls.update(); // sync OrbitControls internal state to final camera position
    }
  } else {
    controls.update();
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ─── Resize ───────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
