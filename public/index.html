<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vercel-feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
    #stats-bar {
      position: sticky; top: 0; z-index: 100; background: #111118;
      border-bottom: 1px solid #222; padding: 12px 20px;
      display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
    }
    .stat { font-size: 13px; color: #888; }
    .stat span { color: #6c63ff; font-weight: 600; }
    #leaderboard { display: flex; gap: 8px; flex-wrap: wrap; }
    .leader-chip {
      background: #1a1a2e; border: 1px solid #333; border-radius: 12px;
      padding: 2px 10px; font-size: 12px; color: #aaa;
    }
    #filters {
      padding: 12px 20px; display: flex; gap: 10px; flex-wrap: wrap;
      background: #0d0d18; border-bottom: 1px solid #1a1a2e;
    }
    .filter-btn {
      background: #1a1a2e; border: 1px solid #333; color: #aaa;
      padding: 4px 14px; border-radius: 20px; cursor: pointer; font-size: 13px;
      text-decoration: none;
    }
    .filter-btn.active { border-color: #6c63ff; color: #6c63ff; }
    #search {
      background: #1a1a2e; border: 1px solid #333; color: #e0e0e0;
      padding: 4px 12px; border-radius: 20px; font-size: 13px; width: 200px;
    }
    #feed {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px; padding: 20px;
    }
    .card {
      background: #111118; border: 1px solid #222; border-radius: 8px;
      overflow: hidden; animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }
    .card.flagged { border-color: #ff4444; }
    .card.suspicious { border-color: #ff8c00; }
    .card-preview { width: 100%; height: 160px; object-fit: cover; background: #1a1a2e; display: block; }
    .card-body { padding: 12px; }
    .card-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .card-title {
      font-size: 14px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 180px;
    }
    .badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid #333;
    }
    .badge.clean { background: #002200; color: #4caf50; border-color: #004400; }
    .badge.suspicious { background: #2a1a00; color: #ff8c00; border-color: #4a2a00; }
    .badge.flagged { background: #2a0000; color: #ff4444; border-color: #4a0000; }
    .badge.scanning { background: #1a1a1a; color: #666; }
    .badge.framework { background: #1a1a2e; color: #6c63ff; }
    .badge.ai-tool { background: #1a002e; color: #c084fc; border-color: #4a0072; }
    .card-desc { font-size: 12px; color: #666; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-footer { display: flex; justify-content: space-between; }
    .card-host { font-size: 11px; color: #555; font-family: monospace; }
    .card-actions { display: flex; gap: 6px; margin-top: 8px; }
    .action-btn {
      font-size: 11px; padding: 3px 10px; border-radius: 12px;
      border: 1px solid #333; background: #1a1a2e; color: #888;
      cursor: pointer; text-decoration: none;
    }
    .action-btn.report { color: #ff4444; border-color: #4a0000; }
    .c2-list { margin-top: 8px; font-size: 11px; font-family: monospace; color: #ff6666; }
    #status-dot {
      position: fixed; bottom: 20px; right: 20px; background: #1a1a2e;
      padding: 8px 14px; border-radius: 8px; font-size: 12px;
      color: #6c63ff; border: 1px solid #333;
    }
  </style>
</head>
<body>

<div id="stats-bar">
  <div class="stat">Seen: <span id="stat-total">0</span></div>
  <div class="stat">Deploys/hr: <span id="stat-rate">0</span></div>
  <div class="stat">Flagged: <span id="stat-flagged">0</span> (<span id="stat-pct">0</span>%)</div>
  <div id="leaderboard"></div>
</div>

<div id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="clean">Clean</button>
  <button class="filter-btn" data-filter="suspicious">Suspicious</button>
  <button class="filter-btn" data-filter="flagged">Flagged</button>
  <button class="filter-btn" data-filter="404">404</button>
  <input id="search" type="text" placeholder="Search...">
  <a href="/rss" class="filter-btn" target="_blank" rel="noopener">RSS</a>
</div>

<div id="feed"></div>
<div id="status-dot">Connecting...</div>

<script>
// All user-data is set via textContent or setAttribute - no innerHTML with external data
const entries = new Map();
let activeFilter = 'all';
let searchQuery = '';

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function el(tag, attrs = {}, text = '') {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text) e.textContent = text;
  return e;
}

function badge(text, cls) {
  return el('span', { class: `badge ${cls}` }, text);
}

function buildCard(entry) {
  const card = el('div', {
    class: `card ${entry.status}`,
    id: `card-${entry.id}`,
    'data-status': entry.status,
    'data-hostname': entry.hostname,
    'data-title': (entry.meta?.title || '').toLowerCase()
  });

  // Preview image
  if (entry.screenshot) {
    const img = el('img', { class: 'card-preview', alt: 'preview', loading: 'lazy' });
    // screenshot is either a data URL we generated or a URLScan URL - both safe to use as src
    img.setAttribute('src', entry.screenshot);
    card.appendChild(img);
  } else {
    card.appendChild(el('div', { class: 'card-preview' }));
  }

  const body = el('div', { class: 'card-body' });

  // Header
  const header = el('div', { class: 'card-header' });
  const title = el('div', { class: 'card-title' });
  title.textContent = entry.meta?.title || entry.hostname;
  header.appendChild(title);

  const badges = el('div', { class: 'badges' });
  badges.appendChild(badge(entry.status, entry.status));
  if (entry.framework) badges.appendChild(badge(entry.framework, 'framework'));
  if (entry.aiTool) badges.appendChild(badge(entry.aiTool, 'ai-tool'));
  header.appendChild(badges);
  body.appendChild(header);

  // Description
  if (entry.meta?.description) {
    body.appendChild(el('div', { class: 'card-desc' }, entry.meta.description));
  }

  // Footer
  const footer = el('div', { class: 'card-footer' });
  footer.appendChild(el('span', { class: 'card-host' }, entry.hostname));
  body.appendChild(footer);

  // C2 IPs
  if (entry.threatIntel?.c2Ips?.length) {
    body.appendChild(el('div', { class: 'c2-list' }, 'C2: ' + entry.threatIntel.c2Ips.join(', ')));
  }

  // Actions
  const actions = el('div', { class: 'card-actions' });
  if (entry.scan?.urlscanId) {
    const openBtn = el('a', {
      class: 'action-btn',
      href: `https://urlscan.io/result/${entry.scan.urlscanId}/`,
      target: '_blank',
      rel: 'noopener noreferrer'
    }, 'Open safely');
    actions.appendChild(openBtn);
  }
  if (entry.mailtoLink) {
    const reportBtn = el('a', {
      class: 'action-btn report',
      href: entry.mailtoLink
    }, 'Report to Vercel');
    actions.appendChild(reportBtn);
  }
  body.appendChild(actions);
  card.appendChild(body);
  return card;
}

function upsertCard(entry) {
  entries.set(entry.id, entry);
  const existing = document.getElementById(`card-${entry.id}`);
  const card = buildCard(entry);
  const feed = document.getElementById('feed');

  if (existing) {
    existing.replaceWith(card);
  } else {
    feed.prepend(card);
    // Prune oldest cards above 200
    const cards = feed.querySelectorAll('.card');
    if (cards.length > 200) cards[cards.length - 1].remove();
  }
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.card').forEach(card => {
    const matchFilter = activeFilter === 'all'
      ? card.dataset.status !== '404'
      : card.dataset.status === activeFilter;
    const matchSearch = !searchQuery
      || card.dataset.hostname.includes(searchQuery)
      || card.dataset.title.includes(searchQuery);
    card.style.display = matchFilter && matchSearch ? '' : 'none';
  });
}

function renderStats(stats) {
  document.getElementById('stat-total').textContent = stats.totalSeen;
  document.getElementById('stat-rate').textContent = stats.deploysPerHour;
  document.getElementById('stat-flagged').textContent = stats.flaggedCount;
  document.getElementById('stat-pct').textContent = stats.flaggedPercent;

  const lb = document.getElementById('leaderboard');
  lb.textContent = '';
  Object.entries(stats.aiToolLeaderboard || {})
    .sort((a, b) => b[1] - a[1])
    .forEach(([tool, count]) => {
      const chip = el('div', { class: 'leader-chip' });
      chip.textContent = `${tool}: ${count}`;
      lb.appendChild(chip);
    });
}

// Filters
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  applyFilters();
});

// SSE
function connect() {
  const es = new EventSource('/events');
  const dot = document.getElementById('status-dot');

  es.onopen = () => { dot.textContent = 'Live'; dot.style.color = '#4caf50'; };
  es.onerror = () => { dot.textContent = 'Reconnecting...'; dot.style.color = '#ff8c00'; };

  es.onmessage = e => {
    try { upsertCard(JSON.parse(e.data)); } catch (_) {}
  };

  es.addEventListener('stats', e => {
    try { renderStats(JSON.parse(e.data)); } catch (_) {}
  });
}

connect();
</script>
</body>
</html>
